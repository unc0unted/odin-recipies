<body>

    <h1>Ratatouille recipe</h1>
    <img src="../images/ratatouille.jpg" alt="ratatouille" width="365">
    
    <h2>Description</h2>
    <p></p>
    <h3>Ingredients</h3>
    <ul>
        <li>Paper bloaters</li>
        <li>Magic liquid</li>
        <li>Good music</li>
    </ul>
    <h3>Steps</h3>
    <ol>
        <li>Take paper bloaters and soak them in magic liquid</li>
        <li>Let bloaters dry</li>
        <li>Eat one tab, put on some good music and wait for 30 minutes</li>
    </ol>
    <h4>Enjoy!</h4>
</body>
